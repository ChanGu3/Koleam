name: Create Release on Main using Tag
run-name: ${{ github.ref_name }} Release ran by ${{ github.actor }}
env:
  BUILD_PATH: ${{ vars.SRC_PATH }}
  RELEASES_PATH: ${{ vars.RELEASES_PATH }}
  CURRENT_DATE: UND

permissions:
  contents: write
  
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: checking out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '26.3.1'

      - name: verifying tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor $GITHUB_SHA origin/main; then
            echo "Tag is not on main."
            exit 1
          fi

      - name: getting current time
        run: echo "CURRENT_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
        
      - name: building "web app and api server" as a bundle
        run: npm run build:all
        working-directory: ./${{ env.BUILD_PATH }}
        
      - name: zipping "web app and api server" as a bundle
        run: |
          rm -rf ./$RELEASES_PATH
          mkdir -p ./$RELEASES_PATH
          zip -r ./$RELEASES_PATH/${{ github.ref_name }}d${{ env.CURRENT_DATE }}.zip ./$BUILD_PATH
        
      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./${{ env.RELEASES_PATH }}/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
